{% extends 'category_list.html' %}

{% block  content %}

<h1>Products</h1>

<h2>{{ category.name }} products</h2>

<ul>
    {% for product in products %}
        <li>
            {{ product.name }} - {{ product.price }}
        </li>
    {% empty %}
        <li>No products found</li>
    {% endfor %}
</ul>

<a href="{% url 'category_list' %}">Back</a>

{% endblock %}
